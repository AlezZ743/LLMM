<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear elementos dinámicamente</title>
    <style>
        body { 
            background-color: #a89995; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding-top: 50px;
            font-family: sans-serif;
        }
        #contenedorDeImagen { 
            width: 400px; 
            height: 300px; 
            background-color: #d7ccc8; 
            border: 2px dashed #666;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            overflow: hidden;
            border-radius: 8px;
        }
        img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            animation: aparecer 0.5s ease-in;
        }
        @keyframes aparecer {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        button {
            padding: 10px 20px;
            background-color: #4db6ac;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <button onclick="agregarImagen()">Agregar Imagen al Div</button>

    <div id="contenedorDeImagen">
        <p id="mensajeVacio">No hay imagen todavía</p>
    </div>

    <script>
        function agregarImagen() {
            // 1. Seleccionamos el contenedor
            var contenedor = document.getElementById("contenedorDeImagen");

            // 2. CREAMOS el elemento <img> (está en memoria, no se ve aún)
            var nuevaImagen = document.createElement("img");

            // 3. Configuramos sus atributos (como aprendimos antes)
            nuevaImagen.src = "https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=400";
            nuevaImagen.alt = "Coche deportivo";

            // 4. Limpiamos el mensaje previo si existe
            contenedor.innerHTML = "";

            // 5. AGREGAMOS el elemento al div (lo instalamos en el DOM)
            contenedor.appendChild(nuevaImagen);
        }
    </script>

</body>
</html>
