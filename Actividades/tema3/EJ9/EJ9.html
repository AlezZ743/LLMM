<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conversor de Temperatura</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #fdfdfd; }
        .conversor { border: 1px solid #ccc; padding: 20px; border-radius: 10px; display: inline-block; }
        input { margin: 5px; padding: 5px; width: 80px; }
        button { padding: 8px 15px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 4px; }
        #mensaje { display: block; margin-top: 15px; font-weight: bold; color: #333; }
    </style>

    <script>
        // Función para convertir de Fahrenheit a Celsius
        function convertirACelsius() {
            // 1. Declarar variable y capturar valor
            var f = document.getElementById("tbf").value;
            
            // 2. Aplicar la fórmula: C = (5/9) * (F - 32)
            var c = (5 / 9) * (f - 32);
            
            // 3. Mostrar el resultado en el otro input y un mensaje con innerHTML
            document.getElementById("tbc").value = c.toFixed(2);
            document.getElementById("mensaje").innerHTML = f + " °F son aproximadamente " + c.toFixed(2) + " °C";
        }

        // Función para convertir de Celsius a Fahrenheit
        function convertirAFahrenheit() {
            // 1. Declarar variable y capturar valor
            var c = document.getElementById("tbc").value;
            
            // 2. Aplicar la fórmula: F = (C * 9/5) + 32
            var f = (c * 9 / 5) + 32;
            
            // 3. Mostrar el resultado en el otro input y un mensaje con innerHTML
            document.getElementById("tbf").value = f.toFixed(2);
            document.getElementById("mensaje").innerHTML = c + " °C son " + f.toFixed(2) + " °F";
        }
    </script>
</head>
<body>

    <h2>Conversor de Temperatura</h2>
    
    <div class="conversor">
        <label for="tbf">Fahrenheit:</label>
        <input type="number" id="tbf" placeholder="°F">
        <button onclick="convertirACelsius()">Convertir a °C ↓</button>
        
        <br><br>
        
        <label for="tbc">Celsius:</label>
        <input type="number" id="tbc" placeholder="°C">
        <button onclick="convertirAFahrenheit()">Convertir a °F ↑</button>

        <span id="mensaje">Introduce un valor y pulsa un botón</span>
    </div>

</body>
</html>
