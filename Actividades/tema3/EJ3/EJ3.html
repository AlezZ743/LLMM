<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Galería de Imágenes</title>
    <link id="theme-stylesheet" rel="stylesheet" href="css/style1.css">
    
    <script>
        // Esta es tu función original, adaptada para ser usada en ambos grupos
        function cambiaImagen(idElemento, nombreArchivo) {
            document.getElementById(idElemento).src = nombreArchivo;   
        }

        // Función para cambiar los estilos CSS
        function cambiaEstilo(archivoCss) {
            document.getElementById('theme-stylesheet').href = archivoCss;
        }
    </script>
</head>
<body>

    <h2>Galería de Imágenes</h2>
    <p>Cambiamos las imágenes mediante el menú desplegable (select) y el estilo con los botones.</p>
    
    <button onclick="cambiaEstilo('css/style1.css')">Estilo 1</button>
    <button onclick="cambiaEstilo('css/style2.css')">Estilo 2</button>

    <hr>

    <div class="container">
        <div class="gallery-section">
            <h3>Coches</h3>
            <img id="imgCoches" src="img/ImagesCars/coche1.jpg" style="height:300px"><br>
            
            <select onchange="cambiaImagen('imgCoches', this.value)">
                <option value="img/ImagesCars/coche1.jpg">Coche 1</option>
                <option value="img/ImagesCars/coche2.jpg">Coche 2</option>
                <option value="img/ImagesCars/coche3.jpg">Coche 3</option>
                <option value="img/ImagesCars/coche4.jpg">Coche 4</option>
                <option value="img/ImagesCars/coche5.jpg">Coche 5</option>
                <option value="img/ImagesCars/coche6.jpg">Coche 6</option>
            </select>
        </div>

        <div class="gallery-section">
            <h3>Spiderman</h3>
            <img id="imgSpiderman" src="img/ImagesSpiderman/spiderman1.jpg" style="height:300px"><br>
            
            <select onchange="cambiaImagen('imgSpiderman', this.value)">
                <option value="img/ImagesSpiderman/spiderman1.jpg">Spiderman 1</option>
                <option value="img/ImagesSpiderman/spiderman2.jpg">Spiderman 2</option>
                <option value="img/ImagesSpiderman/spiderman3.jpg">Spiderman 3</option>
                <option value="img/ImagesSpiderman/spiderman4.jpg">Spiderman 4</option>
                <option value="img/ImagesSpiderman/spiderman5.jpg">Spiderman 5</option>
                <option value="img/ImagesSpiderman/spiderman6.jpg">Spiderman 6</option>
            </select>
        </div>
    </div>

</body>
</html>
