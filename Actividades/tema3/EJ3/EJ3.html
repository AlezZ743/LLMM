<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Dinámica</title>
    <link id="theme-stylesheet" rel="stylesheet" href="css/style1.css">
</head>
<body>

    <header>
        <h1>Galería de Imágenes</h1>
        <div class="theme-switcher">
            <button onclick="changeStyle('css/style1.css')">Estilo 1</button>
            <button onclick="changeStyle('css/style2.css')">Estilo 2</button>
        </div>
    </header>

    <main class="container">
        <section class="gallery-section">
            <h2>Coches</h2>
            <select id="car-select" onchange="updateImage('car-display', this.value)">
                <option value="img/ImagesCars/coche1.jpg">Coche 1</option>
                <option value="img/ImagesCars/coche2.jpg">Coche 2</option>
                <option value="img/ImagesCars/coche3.jpg">Coche 3</option>
                <option value="img/ImagesCars/coche4.jpg">Coche 4</option>
                <option value="img/ImagesCars/coche5.jpg">Coche 5</option>
                <option value="img/ImagesCars/coche6.jpg">Coche 6</option>
            </select>
            <div class="image-frame">
                <img id="car-display" src="img/ImagesCars/coche1.jpg" alt="Coche">
            </div>
        </section>

        <section class="gallery-section">
            <h2>Spiderman</h2>
            <select id="spiderman-select" onchange="updateImage('spidey-display', this.value)">
                <option value="img/ImagesSpiderman/spiderman1.jpg">Spiderman 1</option>
                <option value="img/ImagesSpiderman/spiderman2.jpg">Spiderman 2</option>
                <option value="img/ImagesSpiderman/spiderman3.jpg">Spiderman 3</option>
                <option value="img/ImagesSpiderman/spiderman4.jpg">Spiderman 4</option>
                <option value="img/ImagesSpiderman/spiderman5.jpg">Spiderman 5</option>
                <option value="img/ImagesSpiderman/spiderman6.jpg">Spiderman 6</option>
            </select>
            <div class="image-frame">
                <img id="spidey-display" src="img/ImagesSpiderman/spiderman1.jpg" alt="Spiderman">
            </div>
        </section>
    </main>

    <script>
        function updateImage(imgId, src) {
            document.getElementById(imgId).src = src;
        }

        function changeStyle(sheetPath) {
            document.getElementById('theme-stylesheet').setAttribute('href', sheetPath);
        }
    </script>
</body>
</html>
