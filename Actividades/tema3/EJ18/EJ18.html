<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 8: setTimeout</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .reloj {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .estado {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #34495e;
        }
    </style>
</head>
<body>

    <div class="reloj">⏳</div>
    <div class="estado">
        <h2>Temporizador iniciado</h2>
        <p id="contador">El mensaje aparecerá en 5 segundos...</p>
    </div>

    <script>
        // 1. Definimos la función que queremos ejecutar después
        function mostrarAlerta() {
            alert("¡Han pasado 5 segundos! 🚀");
            document.getElementById("contador").innerHTML = "¡Tiempo cumplido!";
        }

        // 2. Usamos setTimeout
        // El primer parámetro es la FUNCIÓN a ejecutar.
        // El segundo parámetro es el TIEMPO en milisegundos (5000ms = 5s).
        setTimeout(mostrarAlerta, 5000);
    </script>

</body>
</html>
