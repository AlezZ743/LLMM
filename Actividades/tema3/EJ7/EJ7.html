<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrusel de Coches</title>
    <style>
        body {
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .contenedor-slider {
            position: relative;
            width: 600px;
            border: 5px solid #3498db; /* Borde azul como en tu imagen */
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #imagenPrincipal {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
        }

        /* Botones laterales */
        .boton-flecha {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            transition: 0.3s;
        }

        .boton-flecha:hover {
            background-color: #2980b9;
        }

        .izq { left: 0; border-radius: 0 5px 5px 0; }
        .der { right: 0; border-radius: 5px 0 0 5px; }

        .contador {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="contenedor-slider">
        <img id="imagenPrincipal" src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800" alt="Coche">

        <button class="boton-flecha izq" onclick="cambiarImagen(-1)">&#10094;</button>
        <button class="boton-flecha der" onclick="cambiarImagen(1)">&#10095;</button>

        <div class="contador">Imagen <span id="numActual">1</span> de 3</div>
    </div>

    <script>
        // 1. Declaramos el array con las URLs de las imágenes
        var imagenes = [
            "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800", // Porsche
            "https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=800", // Mustang
            "https://unsplash.com/photos/yellow-sports-car-X16zXcbxU4U?w=800"  // Lamborghini
        ];

        // 2. Variable para rastrear en qué posición estamos
        var indiceActual = 0;

        function cambiarImagen(direccion) {
            // Actualizamos la variable del índice
            indiceActual = indiceActual + direccion;

            // Lógica para que el carrusel sea infinito
            if (indiceActual >= imagenes.length) {
                indiceActual = 0;
            }
            if (indiceActual < 0) {
                indiceActual = imagenes.length - 1;
            }

            // 3. Cambiamos el atributo SRC
            document.getElementById("imagenPrincipal").src = imagenes[indiceActual];

            // 4. Actualizamos el texto con innerHTML (sumamos 1 para que el usuario vea 1, 2, 3)
            document.getElementById("numActual").innerHTML = indiceActual + 1;
        }
    </script>

</body>
</html>
