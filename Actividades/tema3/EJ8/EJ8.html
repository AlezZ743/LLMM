<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora JS</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f0f0f0; }
        
        .calculadora { width: 400px; background-color: #333; border: 2px solid #000; }
        
        /* Pantalla de la calculadora */
        #pantalla {
            background-color: #2c2c34;
            color: white;
            height: 80px;
            text-align: right;
            padding: 20px;
            font-size: 2.5rem;
            box-sizing: border-box;
            word-wrap: break-word;
        }

        /* Rejilla de botones */
        .botones { display: grid; grid-template-columns: repeat(4, 1fr); }
        
        button {
            padding: 20px;
            font-size: 1.5rem;
            border: 0.5px solid #999;
            cursor: pointer;
        }

        /* Colores basados en tu imagen */
        .operador { background-color: #ff9f43; color: white; }
        .numero { background-color: #e0e0e0; }
        .especial { background-color: #9999ff; } /* El 5 azul */
        .igual { background-color: #008000; color: white; }
        .borrar { background-color: #ff0000; color: white; }
    </style>
</head>
<body>

    <div class="calculadora">
        <div id="pantalla">0</div>
        
        <div class="botones">
            <button class="operador" onclick="presionar('*')">*</button>
            <button class="operador" onclick="presionar('/')">/</button>
            <button class="operador" onclick="presionar('-')">-</button>
            <button class="operador" onclick="presionar('+')">+</button>

            <button class="numero" onclick="presionar('.')">.</button>
            <button class="numero" onclick="presionar('9')">9</button>
            <button class="numero" onclick="presionar('8')">8</button>
            <button class="numero" onclick="presionar('7')">7</button>

            <button class="numero" onclick="presionar('6')">6</button>
            <button class="especial" onclick="presionar('5')">5</button>
            <button class="numero" onclick="presionar('4')">4</button>
            <button class="numero" onclick="presionar('3')">3</button>

            <button class="numero" onclick="presionar('2')">2</button>
            <button class="numero" onclick="presionar('1')">1</button>
            <button class="numero" onclick="presionar('0')">0</button>
            <button class="igual" onclick="calcular()">=</button>

            <button class="borrar" onclick="limpiar()">C</button>
        </div>
    </div>

    <script>
        // 1. Declaramos la variable que servirá de memoria
        var operacion = "";

        // 2. Función para cuando pulsamos cualquier número u operador
        function presionar(valor) {
            // Asignamos el nuevo valor a nuestra variable
            operacion = operacion + valor;
            
            // Lo mostramos en la pantalla
            document.getElementById("pantalla").innerHTML = operacion;
        }

        // 3. Función para calcular el resultado final
        function calcular() {
            try {
                // eval() toma el texto y lo resuelve matemáticamente
                var resultado = eval(operacion);
                document.getElementById("pantalla").innerHTML = resultado;
                
                // Actualizamos la variable para poder seguir operando sobre el resultado
                operacion = resultado.toString();
            } catch (error) {
                document.getElementById("pantalla").innerHTML = "Error";
                operacion = "";
            }
        }

        // 4. Función para el botón C (borrar)
        function limpiar() {
            operacion = "";
            document.getElementById("pantalla").innerHTML = "0";
        }
    </script>

</body>
</html>
